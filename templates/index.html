<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Instagram Network Graph</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html, body {
            width: 100vw; height: 100vh; margin: 0; padding: 0;
            overflow: hidden;
            font-family: 'Inter', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            transition: background 0.25s, color 0.22s;
        }
        :root {
            --bg: #181a1b;
            --text: #f3f3f3;
            --node: #bfc5c7;
            --node-highlight: #ff6b6b;
            --edge: #33363c;
            --form-bg: rgba(24,26,27,0.93);
            --input-bg: #202325;
            --input-border: #333;
            --input-text: #fafbfc;
        }
        body.light {
            --bg: #f6f7f8;
            --text: #23272c;
            --node: #888da1;
            --node-highlight: #e74c3c;
            --edge: #b2b4bb;
            --form-bg: rgba(255,255,255,0.95);
            --input-bg: #fff;
            --input-border: #e0e0e0;
            --input-text: #23272c;
        }
        
        #graph-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }
        
        #graph-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        
        #graph-svg:active {
            cursor: grabbing;
        }
        
        /* Styles pour les éléments du graphe */
        .link {
            stroke: var(--edge);
            stroke-opacity: 0.6;
            stroke-width: 1.5px;
            fill: none;
        }
        
        .node {
            fill: var(--node);
            stroke: var(--bg);
            stroke-width: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .node:hover {
            fill: var(--node-highlight);
            stroke-width: 3px;
            r: 8;
        }
        
        .node.dragging {
            fill: var(--node-highlight);
            stroke-width: 4px;
        }
        
        .node-label {
            font-family: 'Inter', Arial, sans-serif;
            font-size: 12px;
            fill: var(--text);
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            user-select: none;
        }
        
        .node-label.main {
            font-weight: 600;
            font-size: 14px;
        }
        
        #topbar {
            position: absolute;
            top: 16px; left: 16px; z-index: 10;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 18px;
        }
        
        #back-btn, #toggle-mode-btn, #clear-session-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.3em;
            cursor: pointer;
            opacity: 0.6;
            margin-right: 6px;
            transition: opacity 0.2s;
            padding: 2px 6px;
        }
        
        #back-btn:hover, #toggle-mode-btn:hover, #clear-session-btn:hover { 
            opacity: 1; 
        }
        
        #clear-session-btn {
            font-size: 1.1em;
        }
        
        #loginForm {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            background: var(--form-bg);
            border-radius: 12px;
            padding: 10px 18px 10px 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
            backdrop-filter: blur(10px);
        }
        
        #loginForm input, #loginForm button {
            font-family: inherit;
            font-size: 1em;
            padding: 7px 11px;
            border-radius: 7px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-text);
            outline: none;
            margin-right: 0px;
            transition: background 0.2s, color 0.2s, border 0.2s;
        }
        
        #loginForm input::placeholder { color: #aaa; }
        
        #loginForm button {
            background: #24292e;
            border: none;
            font-weight: 600;
            color: #fafbfc;
            cursor: pointer;
            transition: background 0.18s;
        }
        
        body.light #loginForm button {
            background: #dedede;
            color: #23272c;
        }
        
        #loginForm button:hover { background: #30363d; }
        body.light #loginForm button:hover { background: #e4e4e4; }
        #loginForm input[type="number"] { width: 54px; }
        
        /* Messages de statut */
        #status-message {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--form-bg);
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 20;
            display: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        
        .status-message.success {
            border-left: 4px solid #28a745;
        }
        .status-message.error {
            border-left: 4px solid #dc3545;
        }
        .status-message.warning {
            border-left: 4px solid #ffc107;
        }
        .status-message.info {
            border-left: 4px solid #17a2b8;
        }
        
        /* Contrôles du graphe */
        #graph-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 15;
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: var(--form-bg);
            border: 1px solid var(--input-border);
            color: var(--text);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        
        .control-btn:hover {
            background: var(--input-bg);
        }
    </style>
</head>
<body>
<div id="topbar">
    <button id="back-btn" title="Retour">&#8592;</button>
    <button id="toggle-mode-btn" title="Changer le mode">🌙</button>
    <button id="clear-session-btn" title="Nettoyer la session">🗑️</button>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Utilisateur Instagram" autocomplete="username" required>
        <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
        <input type="number" id="depth" title="Profondeur" min="1" max="4" value="2">
        <button type="submit">Démarrer</button>
    </form>
</div>

<div id="graph-container">
    <svg id="graph-svg"></svg>
</div>

<div id="graph-controls">
    <button class="control-btn" id="center-btn">Centrer</button>
    <button class="control-btn" id="restart-simulation-btn">Relancer</button>
</div>

<div id="status-message" class="status-message"></div>

<script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
